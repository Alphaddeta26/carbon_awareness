version: '3.8'

services:
  # Nginx API Gateway (Exposed on public entry port 5000)
  gateway:
    image: nginx:alpine
    container_name: carbon_gateway
    ports:
      - "5000:5000"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - ingestion-service
      - leaderboard-service
    networks:
      - carbon_network

  # Auth Microservice
  auth-service:
    build: ./backend
    container_name: carbon_auth_service
    environment:
      - SERVICE_TYPE=auth
      - PORT=5001
      - JWT_SECRET=supersecret_carbon_key_2026
      - REDIS_URL=redis://redis:6379
      - DB_SHARD_1_URL=postgres://postgres:postgrespass@postgres-shard1:5432/carbon_shard1
      - DB_SHARD_2_URL=postgres://postgres:postgrespass@postgres-shard2:5432/carbon_shard2
    depends_on:
      - redis
      - postgres-shard1
      - postgres-shard2
    networks:
      - carbon_network

  # Ingestion Microservice (Calculations Ingestion Queue)
  ingestion-service:
    build: ./backend
    container_name: carbon_ingestion_service
    environment:
      - SERVICE_TYPE=ingestion
      - PORT=5002
      - JWT_SECRET=supersecret_carbon_key_2026
      - REDIS_URL=redis://redis:6379
      - DB_SHARD_1_URL=postgres://postgres:postgrespass@postgres-shard1:5432/carbon_shard1
      - DB_SHARD_2_URL=postgres://postgres:postgrespass@postgres-shard2:5432/carbon_shard2
    depends_on:
      - redis
      - postgres-shard1
      - postgres-shard2
    networks:
      - carbon_network

  # Leaderboard Microservice
  leaderboard-service:
    build: ./backend
    container_name: carbon_leaderboard_service
    environment:
      - SERVICE_TYPE=leaderboard
      - PORT=5003
      - JWT_SECRET=supersecret_carbon_key_2026
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - carbon_network

  # Worker Microservice (Event Queue Consumer background task)
  worker-service:
    build: ./backend
    container_name: carbon_worker_service
    environment:
      - SERVICE_TYPE=worker
      - JWT_SECRET=supersecret_carbon_key_2026
      - REDIS_URL=redis://redis:6379
      - DB_SHARD_1_URL=postgres://postgres:postgrespass@postgres-shard1:5432/carbon_shard1
      - DB_SHARD_2_URL=postgres://postgres:postgrespass@postgres-shard2:5432/carbon_shard2
    depends_on:
      - redis
      - postgres-shard1
      - postgres-shard2
    networks:
      - carbon_network

  # Redis Cache & Message Queue
  redis:
    image: redis:7-alpine
    container_name: carbon_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - carbon_network

  # Database Shard 1
  postgres-shard1:
    image: postgres:15-alpine
    container_name: carbon_db_shard1
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespass
      - POSTGRES_DB=carbon_shard1
    volumes:
      - shard1_data:/var/lib/postgresql/data
    networks:
      - carbon_network

  # Database Shard 2
  postgres-shard2:
    image: postgres:15-alpine
    container_name: carbon_db_shard2
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespass
      - POSTGRES_DB=carbon_shard2
    volumes:
      - shard2_data:/var/lib/postgresql/data
    networks:
      - carbon_network

networks:
  carbon_network:
    driver: bridge

volumes:
  redis_data:
  shard1_data:
  shard2_data:
